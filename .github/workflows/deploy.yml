name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install "mkdocs>=1.5,<2" "mkdocs-material>=9,<10" pyyaml mdx-truly-sane-lists

      - name: Build docs and generate nav
        run: |
          python3 << 'EOF'
          import os, shutil, yaml

          # 파일 복사 (Python으로 한글 경로 안전하게 처리)
          os.makedirs('docs', exist_ok=True)
          shutil.copy('README.md', 'docs/README.md')

          folder_map = [
              ('정처기', '01 정처기'),
              ('코테',   '02 코테'),
              ('오픽',   '03 오픽'),
          ]

          for label, folder in folder_map:
              src = folder
              dst = f'docs/{folder}'
              if os.path.exists(src):
                  shutil.copytree(src, dst, dirs_exist_ok=True)

          # 섹션별 파일 목록 수집 (최신순)
          nav_sections = []
          all_files = []

          for label, folder in folder_map:
              folder_path = f'docs/{folder}'
              if not os.path.exists(folder_path):
                  continue
              files = sorted(
                  [f for f in os.listdir(folder_path) if f.endswith('.md')],
                  reverse=True
              )
              if files:
                  entries = [{f[:-3]: f'{folder}/{f}'} for f in files]
                  nav_sections.append({label: entries})
                  for f in files:
                      all_files.append((label, folder, f))

          # 홈페이지(index.md) 생성
          lines = [
              '# So0h의 TIL 📚\n\n',
              '취업 준비 학습 기록입니다.\n\n',
              '---\n\n',
              '## 최근 TIL\n\n',
          ]
          for label, folder, f in all_files[:10]:
              title = f[:-3]
              path = f'{folder}/{f}'
              lines.append(f'- **[{title}]({path})** `{label}`\n')

          with open('docs/index.md', 'w', encoding='utf-8') as fp:
              fp.writelines(lines)

          # mkdocs.yml nav 업데이트
          with open('mkdocs.yml', 'r', encoding='utf-8') as fp:
              config = yaml.safe_load(fp)

          config['nav'] = [
              {'홈': 'index.md'},
              {'소개': 'README.md'},
          ] + nav_sections

          with open('mkdocs.yml', 'w', encoding='utf-8') as fp:
              yaml.dump(config, fp, allow_unicode=True, default_flow_style=False, sort_keys=False)

          EOF

      - name: Deploy
        run: mkdocs gh-deploy --force
