name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install "mkdocs>=1.5,<2" "mkdocs-material>=9,<10" pyyaml mdx-truly-sane-lists

      - name: Build docs and generate nav
        run: python3 .github/scripts/generate_docs.py

      - name: Deploy
        run: mkdocs gh-deploy --force
