name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp README.md docs/
          cp -r "01 정처기" docs/ 2>/dev/null || true
          cp -r "02 코테" docs/ 2>/dev/null || true
          cp -r "03 오픽" docs/ 2>/dev/null || true

      - name: Deploy
        run: mkdocs gh-deploy --force
