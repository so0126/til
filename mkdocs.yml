site_name: so0126의 TIL
site_description: Today I Learned - 취업 준비 학습 기록
site_url: https://so0126.github.io/til/
docs_dir: docs

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

extra_css:
  - assets/css/custom.css

plugins:
  - search:
      lang: ko

markdown_extensions:
  - attr_list
  - mdx_truly_sane_lists:
      nested_indent: 2
      truly_sane: true
  - nl2br
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 최근 TIL: index.md
  - 소개: README.md
  - 정처기: "01 정처기/"
  - 코테: "02 코테/"
  - 오픽: "03 오픽/"
